
<!DOCTYPE HTML>
<HTML>

    <body></body>
    <h1>STUDENT BIO FORM</h1><br><hr weidth="2px">
    <form action="first.html">
       <label>Name </label>
       <input type="text" name="username" value="Hitesh" placeholder="Enter you name" readonly required>
       <br>
       <label>Subjects:</label><br> 
       <input type="checkbox" name="options" value="maths">Maths<br>
       <input type="checkbox"  name="options" value="science">Science<br>

        <select>

        <input type="email" name="email" disabled><br>

        <textarea name="adderss" row="10" column="20"></textarea><br>

        <input type="file" name="files" accept="image/* "><br>
        <input type="checkbox" checked>Terms & Conditions <br>

        <input type="submit">
        <button style="border-radius:30px;"">button</button>
       </form>
</body>
