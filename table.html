<!DOCTYPE html>
<html>
    <head>
        <title>table in html</title>
    </head>
    <body bgcolor=#23900009777>
        <table  cellspacing="3px" cellpadding="5px" style="margin: 10px; border: 10px solid black; width: 50%; height:20px;">
            <thead>
                <tr>
                    <th>Serial number</th>
                    <th>Name</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Ram</td>
                    <td>18</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Shyam</td>
                    <td>20</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Hari</td>
                    <td>22</td>
                </tr>                
            </tbody>
        </table> <br>
        <pre>
             <big>Table 2 with calspan and rowspan</big>
        </pre>
        <table  cellspacing="10px" cellpadding="10px" style="border: 10px solid black; width: 100%; height: 100%;">
            <thead>
                <tr>
                    <th>Serial number</th>
                    <th>Name</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td bgcolor="lightblue" rowspan="2">Ram</td>
                    
                </tr>
                <tr>
                    <td bgcolor="lightgreen" colspan="3">2</td>
                </tr>
            </table>  
    </body>
</html>
